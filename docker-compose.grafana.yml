services:
  crypto-postgres:
    image: postgres:16-alpine
    container_name: crypto-postgres
    environment:
      POSTGRES_DB: ${GRAFANA_PG_DB:-crypto_analytics}
      POSTGRES_USER: ${GRAFANA_PG_USER:-crypto}
      POSTGRES_PASSWORD: ${GRAFANA_PG_PASSWORD:-crypto_password}
    ports:
      - "${GRAFANA_POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - crypto_postgres_data:/var/lib/postgresql/data
      - ${PROJECT_DIR:-.}/grafana/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GRAFANA_PG_USER:-crypto} -d ${GRAFANA_PG_DB:-crypto_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: crypto-grafana
    depends_on:
      crypto-postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/crypto-analytics.json
      GRAFANA_PG_HOST: crypto-postgres
      GRAFANA_PG_PORT: 5432
      GRAFANA_PG_DB: ${GRAFANA_PG_DB:-crypto_analytics}
      GRAFANA_PG_USER: ${GRAFANA_PG_USER:-crypto}
      GRAFANA_PG_PASSWORD: ${GRAFANA_PG_PASSWORD:-crypto_password}
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ${PROJECT_DIR:-.}/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  crypto_postgres_data:
  grafana_data:
